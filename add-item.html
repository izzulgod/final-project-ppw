<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Barang - Sistem Inventaris</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-box-seam text-indigo"></i> NexaInventory
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="items.html">Daftar Barang</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="add-item.html">Tambah Barang</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">Tentang</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Kontak</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5 animate-fade-in">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <!-- JS Alert Container -->
                <div id="alertContainer"></div>

                <div class="card border-0">
                    <div class="card-header bg-transparent py-3">
                        <h4 class="mb-0 fw-bold">Tambah Data Inventaris</h4>
                        <p class="text-muted mb-0 small">Masukkan detail barang baru ke dalam sistem gudang.</p>
                    </div>
                    <div class="card-body p-4">
                        <!-- ELEMEN HTML: FORM -->
                        <form id="addItemForm" novalidate>
                            <div class="mb-3">
                                <label for="itemName" class="form-label">Nama Barang <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="itemName" placeholder="Contoh: Mesin Bor Listrik">
                            </div>
                            
                            <div class="mb-3">
                                <label for="itemCategory" class="form-label">Kategori <span class="text-danger">*</span></label>
                                <select class="form-select" id="itemCategory">
                                    <option value="" selected disabled>Pilih Kategori...</option>
                                    <option value="Elektronik">Elektronik</option>
                                    <option value="Perabotan">Perabotan</option>
                                    <option value="Perkakas">Perkakas</option>
                                    <option value="Lainnya">Lainnya</option>
                                </select>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="itemStock" class="form-label">Jumlah Stok <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" id="itemStock" placeholder="0" min="0">
                                        <span class="input-group-text">Unit</span>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="itemPrice" class="form-label">Harga Satuan <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text">Rp</span>
                                        <input type="number" class="form-control" id="itemPrice" placeholder="0" min="1">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="itemNotes" class="form-label">Keterangan Tambahan (Opsional)</label>
                                <textarea class="form-control" id="itemNotes" rows="3" placeholder="Tuliskan catatan khusus kondisi barang jika ada..."></textarea>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="reset" class="btn btn-light me-md-2">Reset</button>
                                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i> Simpan Data</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p class="mb-0">© 2026 NexaInventory System.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
