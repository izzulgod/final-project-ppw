<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Barang - Sistem Inventaris</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-box-seam text-indigo"></i> NexaInventory
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="items.html">Daftar Barang</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="add-item.html">Tambah Barang</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">Tentang</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Kontak</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5 animate-fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0 fw-bold">Daftar Barang Gudang</h2>
            <a href="add-item.html" class="btn btn-primary"><i class="bi bi-plus"></i> Item Baru</a>
        </div>

        <div class="card border-0 mb-4">
            <div class="card-body p-4">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <!-- Search Input for JS Logic -->
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" id="searchItem" class="form-control border-start-0 ps-0" placeholder="Cari berdasarkan nama atau kode barang...">
                        </div>
                    </div>
                </div>

                <div class="table-responsive rounded border">
                    <!-- ELEMEN HTML: TABLE -->
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Kode (SKU)</th>
                                <th>Nama Barang</th>
                                <th>Kategori</th>
                                <th>Stok</th>
                                <th>Harga Satuan</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <!-- Data akan dimuat melalui JavaScript dari LocalStorage -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

        <!-- Edit Item Modal -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editModalLabel">Edit Data Barang</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editItemForm">
                            <input type="hidden" id="editItemSku">
                            <div class="mb-3">
                                <label for="editItemName" class="form-label">Nama Barang</label>
                                <input type="text" class="form-control" id="editItemName" required>
                            </div>
                            <div class="mb-3">
                                <label for="editItemCategory" class="form-label">Kategori</label>
                                <select class="form-select" id="editItemCategory" required>
                                    <option value="Elektronik">Elektronik</option>
                                    <option value="Perabotan">Perabotan</option>
                                    <option value="Perkakas">Perkakas</option>
                                    <option value="Aksesoris">Aksesoris</option>
                                    <option value="Lainnya">Lainnya</option>
                                </select>
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label for="editItemStock" class="form-label">Stok</label>
                                    <input type="number" class="form-control" id="editItemStock" min="0" required>
                                </div>
                                <div class="col-6">
                                    <label for="editItemPrice" class="form-label">Harga Satuan</label>
                                    <input type="number" class="form-control" id="editItemPrice" min="1" required>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="button" class="btn btn-primary" id="saveEditBtn">Simpan Perubahan</button>
                    </div>
                </div>
            </div>
        </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p class="mb-0">© 2026 NexaInventory System.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
